name: FundamenTracker Automation

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose Run Mode"
        required: true
        default: "scan"
        type: choice
        options:
          - scan
          - test

jobs:
  fundamentracker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Download previous state (if exists)
      - name: Download previous state
        uses: actions/download-artifact@v4
        with:
          name: fundamentracker-state
          path: data
        continue-on-error: true

      # ✅ Ensure folder exists even if no artifact found
      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests

      - name: Execute Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ github.event.inputs.mode || 'scan' }}"

          if [ "$MODE" = "test" ]; then
            python src/main.py --test
          else
            python src/main.py
          fi

      # ✅ Upload updated state as artifact
      - name: Upload updated state
        uses: actions/upload-artifact@v4
        with:
          name: fundamentracker-state
          path: data/state.json