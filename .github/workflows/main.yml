name: FundamenTracker Automation

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose Run Mode"
        required: true
        default: "scan"
        type: choice
        options: [scan, test]

jobs:
  fundamentracker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JSONBIN_ID: ${{ secrets.JSONBIN_ID }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'scan' }}"
          if [ "$MODE" = "test" ]; then
            python src/main.py --test
          else
            python src/main.py
          fi