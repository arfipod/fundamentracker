name: fundamentracker Automation

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run Mode"
        required: true
        default: "scan"
        type: choice
        options:
          - scan
          - test
          - cli

      action:
        description: "add/remove (only for cli)"
        required: false
        type: choice
        options:
          - add
          - remove

      ticker:
        description: "Ticker (only for cli)"
        required: false
        type: string

      value:
        description: "PE trigger (only for cli add)"
        required: false
        type: string

  # âś… AĂ±adido para activaciĂłn desde Pipedream â†’ Telegram
  repository_dispatch:
    types: [telegram_command]


jobs:
  fundamentracker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JSONBIN_ID: ${{ secrets.JSONBIN_ID }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
        run: |
          echo "Evento recibido: ${{ github.event_name }}"

          # âś… Si viene desde Telegram vĂ­a Pipedream
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Modo: Telegram /dispatch"

            MODE="cli"

            # Quitar "/" del comando enviado (/add â†’ add)
            ACTION=$(echo "${{ github.event.client_payload.command }}" | sed 's/\///')

            TICKER="${{ github.event.client_payload.ticker }}"
            VALUE="${{ github.event.client_payload.value }}"

          else
            echo "Modo normal (cron o manual)"

            MODE="${{ github.event.inputs.mode }}"
            ACTION="${{ github.event.inputs.action }}"
            TICKER="${{ github.event.inputs.ticker }}"
            VALUE="${{ github.event.inputs.value }}"
          fi

          echo "---- DEBUG ----"
          echo "MODE=$MODE"
          echo "ACTION=$ACTION"
          echo "TICKER=$TICKER"
          echo "VALUE=$VALUE"
          echo "----------------"

          if [ "$MODE" = "test" ]; then
            python src/main.py --test

          elif [ "$MODE" = "cli" ]; then
            python src/main.py --cli \
              --action "$ACTION" \
              --ticker "$TICKER" \
              --value "$VALUE"

          else
            python src/main.py
          fi