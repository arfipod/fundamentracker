services:
  api:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - .:/app
    command: [ "uvicorn", "api.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
